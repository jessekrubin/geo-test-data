name: "ci"

on: [push, pull_request]
jobs:
  main:
    name: main
    runs-on: ubuntu-latest
    steps:
      - name: "Hello"
        run: |
          echo "Hello"

  automerge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'
    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: fastify/github-action-merge-dependabot@v3
        with:
          target: "minor"
          exclude: "@types/node"

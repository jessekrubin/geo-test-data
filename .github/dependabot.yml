version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: gitsubmodule
    schedule:
      interval: "daily"
    directory: /

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: "daily"
    cooldown:
      default-days: 2
      include:
        - "*"
      exclude:
        - "@jsse/*"
